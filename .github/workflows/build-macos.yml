name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-x64:
    name: Build macOS (x64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (x64)
        run: npm run build && npx electron-builder --mac dmg zip --x64 --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts (x64)
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  build-mac-arm64:
    name: Build macOS (arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (arm64)
        run: npm run build && npx electron-builder --mac dmg zip --arm64 --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
